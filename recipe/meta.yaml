{% set name = "auto-sklearn" %}
{% set version = "0.15.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  - url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
    sha256: 082941a56acfc93a83e221e08ef5d5b2083b1ff58d18be7c27d003a11e4a41d0

build:
  number: 0
  skip: True  # [py<37 or py>39 or win]
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv

requirements:
  host:
    - pip
    - python
    - setuptools
    - wheel
  run:
    - python
    - configspace >=0.4.21,<0.5
    - dask-core >=2021.12
    - distributed >=2012.12
    - distro
    - joblib
    - liac-arff
    - numpy >=1.9.0
    - pandas >=1.0
    - pynisher >=0.6.3,<0.7
    - pyrfr >=0.8.1,<0.9
    - pyyaml
    - scikit-learn >=0.24.0,<0.25.0
    - scipy >=1.7.0
    - smac >=1.2,<1.3
    - threadpoolctl
    - typing_extensions

test:
  imports:
    - autosklearn
    - autosklearn.data
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://automl.github.io/auto-sklearn
  summary: Automated machine learning.
  description: |
    auto-sklearn is an automated machine learning toolkit and a drop-in replacement for a scikit-learn estimator.
  license: BSD-3-Clause AND Apache-2.0
  license_file:
    - LICENSE.txt
    - autosklearn/automl_common/LICENSE
  license_family: Other
  doc_url: https://automl.github.io/auto-sklearn/master/manual.html
  dev_url: https://github.com/automl/auto-sklearn

extra:
  recipe-maintainers:
    - BastianZim
    - mfeurer
